services:
  mcp_server:
    build:
      context: ./services/mcp_server
      dockerfile: Dockerfile
    ports:
      - "${MCP_PORT:-8001}:8001"
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_SECRETS_NAME=${AWS_SECRETS_NAME}
      - S3_BUCKET=${S3_BUCKET}
      - CEDAR_POLICY_PATH=/app/policies
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - CERTS_DIR=/app/certs
    volumes:
      - ./services/mcp_server:/app
      - ./policies:/app/policies
      - ./certs:/app/certs
    networks:
      - a2a_network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  admin_bootstrap:
    build:
      context: ./services/admin_bootstrap
      dockerfile: Dockerfile
    ports:
      - "${ADMIN_PORT:-8002}:8002"
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_SECRETS_NAME=${AWS_SECRETS_NAME}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CERTS_DIR=/app/certs
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-demo-admin-key-12345}
    volumes:
      - ./services/admin_bootstrap:/app
      - ./certs:/app/certs
    networks:
      - a2a_network
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  demo_web:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "${DEMO_PORT:-8765}:8765"
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_SECRETS_NAME=${AWS_SECRETS_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - CLOUDWATCH_LOG_GROUP=${CLOUDWATCH_LOG_GROUP:-/a2a-trust-poc/audit}
      - MCP_URL=http://mcp_server:8001
      - ADMIN_URL=http://admin_bootstrap:8002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CERTS_DIR=/app/certs
    volumes:
      - ./demo:/app
      - ./certs:/app/certs
    networks:
      - a2a_network
    depends_on:
      - mcp_server
      - admin_bootstrap
    command: uvicorn app:app --host 0.0.0.0 --port 8765 --reload

networks:
  a2a_network:
    driver: bridge
